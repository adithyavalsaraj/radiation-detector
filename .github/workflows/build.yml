name: Build Desktop Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ELECTRON_BUILDER_HTTP_TIMEOUT: 600000 # 10 minutes timeout for uploads

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.versioning.outputs.version }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Calculate Next Version
        id: versioning
        run: |
          git fetch --tags
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          BUMP_TYPE="patch"
          if [[ "$COMMIT_MSG" == *"MAJOR"* ]] || [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            BUMP_TYPE="major"
          elif [[ "$COMMIT_MSG" == *"feat"* ]] || [[ "$COMMIT_MSG" == *"minor"* ]]; then
            BUMP_TYPE="minor"
          fi
          
          npm version $BUMP_TYPE --no-git-tag-version
          cd frontend && npm version $BUMP_TYPE --no-git-tag-version && cd ..
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push Version Bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json frontend/package.json
          git commit -m "chore: bump version to ${{ steps.versioning.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: main # Ensure we pick up the pushed version bump
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Package Desktop App
        run: |
          npm run build:frontend
          npx electron-builder build --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Built Installers
        uses: actions/upload-artifact@v6
        with:
          name: Radiation-Tracker-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
            release/*.blockmap
          if-no-files-found: warn

  build-android:
    runs-on: ubuntu-latest
    needs: prepare # Parallelize with desktop builds to save time
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: main # Ensure we pick up the pushed version bump
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Get Current Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Install Dependencies
        run: npm install
      - name: Build Frontend
        run: npm run build:frontend
      - name: Sync Capacitor Android
        run: npx cap sync android
        working-directory: frontend
      - name: Build Android APK
        run: chmod +x gradlew && ./gradlew assembleDebug
        working-directory: frontend/android
      - name: Rename APK for Release
        run: mv frontend/android/app/build/outputs/apk/debug/app-debug.apk frontend/android/app/build/outputs/apk/debug/RadiationTracker-android.apk
      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Radiation-Tracker-Android
          path: frontend/android/app/build/outputs/apk/debug/RadiationTracker-android.apk
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/android/app/build/outputs/apk/debug/RadiationTracker-android.apk
          tag_name: v${{ steps.get_version.outputs.version }}
          name: "Radiation Tracker v${{ steps.get_version.outputs.version }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-vercel:
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
